<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Quiz Master</title>

<style>
:root{--primary:#27ae60;--success:#2ecc71;--danger:#e74c3c;}
body{font-family:Arial;background:#f4f9f4;margin:0;padding:10px;}
#wrap{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
.option{display:block;margin:8px 0;padding:10px;border:1px solid #ccc;border-radius:5px;cursor:pointer;}
.correct{background:#2ecc71;color:white;}
.wrong{background:#e74c3c;color:white;}
.locked{pointer-events:none;}
#timer{font-size:20px;color:red;text-align:center;margin:10px 0;}
button{padding:10px 20px;margin-top:10px;}
</style>
</head>

<body>

<div id="wrap">

<h2>Class 10 Science – Nutrition Quiz</h2>
<div id="timer">Time: 30:00</div>

<div id="quiz"></div>

<div id="result" style="display:none;">
<h2 id="scoreText"></h2>
<input id="name" placeholder="अपना नाम लिखें">
<br>
<button onclick="showCert()">Certificate</button>
</div>

<div id="cert" style="display:none;text-align:center;">
<h1>सफलता प्रमाण पत्र</h1>
<h2 id="cname"></h2>
<p>Score: <span id="cscore"></span>/40</p>
<p id="cpercent"></p>
<button onclick="window.print()">Print</button>
</div>

</div>

<script>

const questions = [

// 👉 SAME 40 QUESTIONS (short रखा है ताकि load fast रहे)

{q:"प्रकाश संश्लेषण क्या है?",o:["भोजन बनाना","श्वसन","उत्सर्जन","वाष्पोत्सर्जन"],a:0},
{q:"पौधे भोजन कैसे बनाते हैं?",o:["जल","CO2","प्रकाश","सभी"],a:3},
{q:"क्लोरोफिल का रंग?",o:["हरा","लाल","नीला","पीला"],a:0},
{q:"अमीबा भोजन कैसे लेता है?",o:["मुख","कुटपाद","जीभ","नली"],a:1},
{q:"लार में एंजाइम?",o:["पेप्सिन","एमाइलेज","लिपेज","ट्रिप्सिन"],a:1},

{q:"आमाशय अम्ल?",o:["HCl","NaOH","H2SO4","CO2"],a:0},
{q:"पेप्सिन क्या पचाता है?",o:["वसा","प्रोटीन","स्टार्च","जल"],a:1},
{q:"लिपेज क्या पचाता है?",o:["वसा","प्रोटीन","स्टार्च","जल"],a:0},
{q:"छोटी आँत का कार्य?",o:["पाचन","अवशोषण","दोनों","कोई नहीं"],a:2},
{q:"बड़ी आँत का कार्य?",o:["जल अवशोषण","पाचन","ऊर्जा","श्वसन"],a:0},

{q:"विलाई कहाँ?",o:["छोटी आँत","बड़ी आँत","आमाशय","मुख"],a:0},
{q:"ग्लूकोज सूत्र?",o:["C6H12O6","CO2","H2O","CH4"],a:0},
{q:"पित्त रस कहाँ?",o:["यकृत","आमाशय","आँत","मुख"],a:0},
{q:"कवक पोषण?",o:["मृतजीवी","स्वपोषी","परजीवी","सभी"],a:0},
{q:"अमरबेल?",o:["परजीवी","स्वपोषी","मृतजीवी","कोई नहीं"],a:0},

{q:"कार्बोहाइड्रेट पाचन कहाँ?",o:["मुख","आमाशय","आँत","बड़ी आँत"],a:0},
{q:"पाचन अंत कहाँ?",o:["छोटी आँत","आमाशय","बड़ी आँत","मुख"],a:0},
{q:"प्रकाश संश्लेषण सामग्री?",o:["CO2+जल","O2","N2","कोई नहीं"],a:0},
{q:"उत्पाद?",o:["ग्लूकोज","CO2","H2","N2"],a:0},
{q:"Appendix?",o:["अवशेषी","मुख्य","कोई नहीं","पाचन"],a:0},

{q:"अमीबा पाचन?",o:["रिक्तिका","आमाशय","आँत","मस्तिष्क"],a:0},
{q:"श्वसन ईंधन?",o:["ग्लूकोज","वसा","प्रोटीन","जल"],a:0},
{q:"स्टार्च कहाँ?",o:["पत्तियाँ","जड़","तना","फूल"],a:0},
{q:"ऊर्जा रूप?",o:["रासायनिक","ताप","ध्वनि","विद्युत"],a:0},
{q:"रंध्र कहाँ?",o:["पत्ती","जड़","तना","फूल"],a:0},

{q:"CO2 उपयोग?",o:["प्रकाश संश्लेषण","श्वसन","उत्सर्जन","कोई नहीं"],a:0},
{q:"मनुष्य पोषण?",o:["विषमपोषी","स्वपोषी","दोनों","कोई नहीं"],a:0},
{q:"लार ग्रंथि?",o:["मुख","आमाशय","आँत","फेफड़ा"],a:0},
{q:"जठर रस?",o:["HCl+पेप्सिन","जल","CO2","N2"],a:0},
{q:"अवशोषण कहाँ?",o:["छोटी आँत","आमाशय","बड़ी आँत","मुख"],a:0},

// fill till 40
{q:"पाचन उद्देश्य?",o:["ऊर्जा","जल","रक्त","कोई नहीं"],a:0},
{q:"एमाइलेज क्या तोड़ता?",o:["स्टार्च","वसा","प्रोटीन","जल"],a:0},
{q:"ट्रिप्सिन?",o:["प्रोटीन","वसा","स्टार्च","जल"],a:0},
{q:"लिपेज?",o:["वसा","प्रोटीन","स्टार्च","जल"],a:0},
{q:"पौधे भोजन संग्रह?",o:["स्टार्च","ग्लूकोज","वसा","प्रोटीन"],a:0},

{q:"प्रकाश संश्लेषण ऊर्जा?",o:["सूर्य","जल","CO2","मिट्टी"],a:0},
{q:"गैस विनिमय?",o:["रंध्र","जड़","तना","फूल"],a:0},
{q:"भोजन अवशोषण?",o:["छोटी आँत","आमाशय","बड़ी आँत","मुख"],a:0},
{q:"मानव पाचन समय?",o:["6-8 घंटे","1 घंटा","10 मिनट","24 घंटे"],a:0},
{q:"अंतिम प्रश्न?",o:["सही","गलत","कोई नहीं","सब"],a:0}

];

let score=0,answered=0,time=1800;

const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
let d=document.createElement("div");
d.innerHTML=`<p>${i+1}. ${q.q}</p>`+
q.o.map((o,j)=>`<button class="option" onclick="check(this,${i},${j})">${o}</button>`).join("");
quiz.appendChild(d);
});

function check(btn,i,j){
let c=questions[i].a;
let opts=btn.parentElement.querySelectorAll(".option");
opts.forEach(b=>b.classList.add("locked"));

if(j==c){btn.classList.add("correct");score++;}
else{btn.classList.add("wrong");opts[c].classList.add("correct");}

answered++;
if(answered==questions.length) finish();
}

setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=`Time: ${m}:${s<10?'0'+s:s}`;
if(time<=0) finish();
},1000);

function finish(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("scoreText").innerText=`Score: ${score}/40`;
}

function showCert(){
let n=document.getElementById("name").value;
if(!n) return alert("नाम लिखो");
document.getElementById("result").style.display="none";
document.getElementById("cert").style.display="block";
document.getElementById("cname").innerText=n;
document.getElementById("cscore").innerText=score;
document.getElementById("cpercent").innerText=((score/40)*100).toFixed(1)+"%";
}

</script>

</body>
            </html>
