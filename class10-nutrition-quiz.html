<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 Nutrition Quiz</title>

<style>
:root{--primary:#27ae60;--success:#2ecc71;--danger:#e74c3c;}
body{font-family:Arial;background:#f4f9f4;margin:0;padding:10px;}
#wrap{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
.option{display:block;margin:8px 0;padding:10px;border:1px solid #ccc;border-radius:5px;cursor:pointer;}
.correct{background:#2ecc71;color:white;}
.wrong{background:#e74c3c;color:white;}
.locked{pointer-events:none;}
#timer{font-size:20px;color:red;text-align:center;margin:10px 0;}
.btn{padding:10px 20px;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<div id="wrap">

<h2>Class 10 Science – Nutrition Quiz (40 MCQ)</h2>
<div id="timer">Time: 30:00</div>

<div id="quiz"></div>

<div id="result" style="display:none;">
<h2 id="scoreText"></h2>
<input id="name" placeholder="अपना नाम लिखें">
<br>
<button class="btn" onclick="showCert()">Certificate</button>
</div>

<div id="cert" style="display:none;text-align:center;">
<h1>सफलता प्रमाण पत्र</h1>
<h2 id="cname"></h2>
<p>Score: <span id="cscore"></span>/40</p>
<p>Percentage: <span id="cpercent"></span>%</p>
<p id="cdate"></p>
<button class="btn" onclick="window.print()">Print / PDF</button>
</div>

</div>

<script>

const questions = [

{q:"प्रकृति में ऑक्सीजन और कार्बन डाइऑक्साइड का संतुलन मुख्यतः किस प्रक्रिया द्वारा बना रहता है?",o:["श्वसन","प्रकाश संश्लेषण","उत्सर्जन","वाष्पोत्सर्जन"],a:1},
{q:"प्रकाश संश्लेषण में ऑक्सीजन किस पदार्थ से मुक्त होती है?",o:["CO2","जल","ग्लूकोज","क्लोरोफिल"],a:1},
{q:"क्लोरोफिल का मुख्य कार्य क्या है?",o:["जल तोड़ना","प्रकाश अवशोषित करना","CO2 लेना","ग्लूकोज बनाना"],a:1},
{q:"स्वपोषी पोषण के लिए क्या आवश्यक है?",o:["प्रकाश","क्लोरोफिल","CO2","सभी"],a:3},
{q:"अमीबा में भोजन लेने की प्रक्रिया क्या कहलाती है?",o:["Diffusion","Endocytosis","Osmosis","Respiration"],a:1},

{q:"अमीबा में पाचन कहाँ होता है?",o:["झिल्ली","भोजन रिक्तिका","नाभिक","माइटोकॉन्ड्रिया"],a:1},
{q:"मानव में पाचन कहाँ से शुरू होता है?",o:["आमाशय","मुख","आँत","ग्रसनी"],a:1},
{q:"लार में कौन एंजाइम होता है?",o:["पेप्सिन","एमाइलेज","लिपेज","ट्रिप्सिन"],a:1},
{q:"HCl का कार्य क्या है?",o:["ऊर्जा देना","अम्लीय माध्यम देना","जल बनाना","रक्त बनाना"],a:1},
{q:"पेप्सिन किसका पाचन करता है?",o:["वसा","प्रोटीन","स्टार्च","विटामिन"],a:1},

{q:"लिपेज किसका पाचन करता है?",o:["प्रोटीन","वसा","कार्बोहाइड्रेट","जल"],a:1},
{q:"ट्रिप्सिन किसका पाचन करता है?",o:["प्रोटीन","वसा","स्टार्च","जल"],a:0},
{q:"छोटी आँत का मुख्य कार्य क्या है?",o:["पाचन","अवशोषण","दोनों","कोई नहीं"],a:2},
{q:"बड़ी आँत का मुख्य कार्य क्या है?",o:["पाचन","जल अवशोषण","ऊर्जा","श्वसन"],a:1},
{q:"विलाई का कार्य क्या है?",o:["पाचन","अवशोषण","जल निकालना","ऊर्जा देना"],a:1},

{q:"कार्बोहाइड्रेट का अंतिम उत्पाद क्या है?",o:["ग्लूकोज","अमीनो अम्ल","वसा","स्टार्च"],a:0},
{q:"प्रोटीन का अंतिम उत्पाद क्या है?",o:["ग्लूकोज","अमीनो अम्ल","वसा","स्टार्च"],a:1},
{q:"वसा का अंतिम उत्पाद क्या है?",o:["ग्लूकोज","अमीनो अम्ल","वसीय अम्ल","स्टार्च"],a:2},
{q:"ऊर्जा किस रूप में संग्रहित होती है?",o:["ताप","रासायनिक","ध्वनि","विद्युत"],a:1},
{q:"पौधे भोजन किस रूप में संग्रहित करते हैं?",o:["ग्लूकोज","स्टार्च","वसा","प्रोटीन"],a:1},

{q:"प्रकाश संश्लेषण की कच्ची सामग्री क्या है?",o:["CO2+जल","O2","N2","कोई नहीं"],a:0},
{q:"उप-उत्पाद क्या है?",o:["CO2","O2","N2","CH4"],a:1},
{q:"कवक पोषण?",o:["मृतजीवी","स्वपोषी","परजीवी","सभी"],a:0},
{q:"अमरबेल उदाहरण?",o:["स्वपोषी","परजीवी","मृतजीवी","कोई नहीं"],a:1},
{q:"मनुष्य किस प्रकार का पोषण करता है?",o:["स्वपोषी","विषमपोषी","दोनों","कोई नहीं"],a:1},

{q:"पाचन तंत्र की सबसे लंबी संरचना कौन-सी है?",o:["आमाशय","छोटी आँत","बड़ी आँत","ग्रसनी"],a:1},
{q:"Appendix क्या है?",o:["मुख्य अंग","अवशेषी अंग","पाचन अंग","कोई नहीं"],a:1},
{q:"पाचन का उद्देश्य क्या है?",o:["ऊर्जा बनाना","भोजन सरल बनाना","जल बनाना","रक्त बनाना"],a:1},
{q:"श्वसन का ईंधन क्या है?",o:["ग्लूकोज","वसा","प्रोटीन","जल"],a:0},
{q:"रंध्र का कार्य क्या है?",o:["जल लेना","गैस विनिमय","भोजन बनाना","ऊर्जा बनाना"],a:1},

{q:"CO2 का उपयोग किसमें होता है?",o:["श्वसन","प्रकाश संश्लेषण","उत्सर्जन","कोई नहीं"],a:1},
{q:"लार ग्रंथि कहाँ होती है?",o:["मुख","आमाशय","आँत","फेफड़ा"],a:0},
{q:"जठर रस में क्या होता है?",o:["HCl+पेप्सिन","जल","CO2","N2"],a:0},
{q:"भोजन का पूर्ण पाचन कहाँ होता है?",o:["आमाशय","छोटी आँत","बड़ी आँत","मुख"],a:1},
{q:"अवशोषण कहाँ होता है?",o:["आमाशय","छोटी आँत","बड़ी आँत","मुख"],a:1},

{q:"Exocytosis क्या है?",o:["भोजन लेना","भोजन बाहर करना","श्वसन","विभाजन"],a:1},
{q:"एंजाइम का कार्य क्या है?",o:["ऊर्जा बनाना","क्रिया तेज करना","जल बनाना","गैस बनाना"],a:1},
{q:"जल का अवशोषण कहाँ होता है?",o:["छोटी आँत","बड़ी आँत","आमाशय","मुख"],a:1},
{q:"अग्न्याशय का कार्य क्या है?",o:["रक्त बनाना","एंजाइम बनाना","जल लेना","गैस लेना"],a:1},
{q:"पोषण का अर्थ क्या है?",o:["भोजन लेना","ऊर्जा लेना","उपयोग करना","इन सभी का समुच्चय"],a:3}

];

let score=0,answered=0,time=1800;

const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
let d=document.createElement("div");
d.innerHTML=`<p><b>${i+1}. ${q.q}</b></p>`+
q.o.map((opt,j)=>`<button class="option" onclick="check(this,${i},${j})">${opt}</button>`).join("");
quiz.appendChild(d);
});

function check(btn,i,j){
let correct=questions[i].a;
let opts=btn.parentElement.querySelectorAll(".option");
opts.forEach(b=>b.classList.add("locked"));

if(j==correct){btn.classList.add("correct");score++;}
else{btn.classList.add("wrong");opts[correct].classList.add("correct");}

answered++;
if(answered===questions.length) finish();
}

setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=`Time: ${m}:${s<10?'0'+s:s}`;
if(time<=0) finish();
},1000);

function finish(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("scoreText").innerText=`Score: ${score}/40`;
}

function showCert(){
let name=document.getElementById("name").value;
if(!name) return alert("नाम लिखें");
document.getElementById("result").style.display="none";
document.getElementById("cert").style.display="block";
document.getElementById("cname").innerText=name;
document.getElementById("cscore").innerText=score;
document.getElementById("cpercent").innerText=((score/40)*100).toFixed(1);
document.getElementById("cdate").innerText=new Date().toLocaleDateString('hi-IN');
}

</script>

</body>
</html>
